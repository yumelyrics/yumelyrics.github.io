name: Deploy 404 Isekai

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Job 1: Deploy Cloudflare Worker ─────────────────────────────────
  deploy-worker:
    runs-on: ubuntu-latest
    outputs:
      worker_url: ${{ steps.get-url.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy Worker & set Discord secret
        id: get-url
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          npx wrangler@latest secret put DISCORD_WEBHOOK_URL \
            --name isekai-discord <<< "${{ secrets.DISCORD_WEBHOOK_URL_404 }}"

          DEPLOY_OUT=$(npx wrangler@latest deploy --name isekai-discord 2>&1)
          echo "$DEPLOY_OUT"

          # Ambil URL worker dari output wrangler
          URL=$(echo "$DEPLOY_OUT" | grep -Eo 'https://isekai-discord\.[^[:space:]]+' | head -1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"

  # ── Job 2: Deploy GitHub Pages ───────────────────────────────────────
  deploy-pages:
    needs: deploy-worker
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject config ke 404.html
        run: |
          sed -i \
            -e 's|__FIREBASE_API_KEY__|${{ secrets.FIREBASE_API_KEY }}|g' \
            -e 's|__FIREBASE_AUTH_DOMAIN__|${{ secrets.FIREBASE_AUTH_DOMAIN }}|g' \
            -e 's|__FIREBASE_PROJECT_ID__|${{ secrets.FIREBASE_PROJECT_ID }}|g' \
            -e 's|__FIREBASE_STORAGE_BUCKET__|${{ secrets.FIREBASE_STORAGE_BUCKET }}|g' \
            -e 's|__FIREBASE_MESSAGING_SENDER_ID__|${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}|g' \
            -e 's|__FIREBASE_APP_ID__|${{ secrets.FIREBASE_APP_ID }}|g' \
            -e 's|__CF_WORKER_URL__|${{ needs.deploy-worker.outputs.worker_url }}|g' \
            404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
