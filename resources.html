<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Resources — YumeSubs</title>
<link rel="icon" type="image/jpeg" href="anime_icon.png">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root{--bg:#050d1a;--border:rgba(255,255,255,0.07);--accent:#c9a96e;--accent2:#4f7ec4;--text:#dde6f5;--muted:#5a6a82;--jp:'Shippori Mincho',serif;--en:'DM Sans',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html,body{margin:0;padding:0}html{scroll-behavior:smooth;background:#050d1a}
body{color:var(--text);font-family:var(--en);min-height:100dvh;overflow-x:hidden;position:relative}
.wrap{position:relative;z-index:2}
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;height:60px;background:rgba(5,13,26,.9);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);min-width:0}
.nav-logo{display:flex;align-items:center;gap:.5rem;text-decoration:none;flex-shrink:0;min-width:0}
.nljp{font-family:var(--jp);font-size:1.2rem;font-weight:800;color:var(--accent);white-space:nowrap;line-height:1}
.nlen{font-size:.6rem;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;white-space:nowrap;line-height:1}
.nav-links{display:flex;gap:.25rem;align-items:center;flex-shrink:0}
.nb{background:none;border:none;font-family:var(--en);font-size:.7rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;padding:.45rem .9rem;cursor:pointer;border-radius:2rem;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;white-space:nowrap}
.nb:hover,.nb.on{color:var(--text);background:rgba(255,255,255,.06)}
.main{padding:3rem 2.5rem 6rem;max-width:1100px;margin:0 auto}
.hero{margin-bottom:3rem}
.eyebrow{font-size:.6rem;color:var(--accent);letter-spacing:.35em;text-transform:uppercase;margin-bottom:.8rem}
.hero h1{font-family:var(--jp);font-size:clamp(1.8rem,4vw,3rem);font-weight:800;color:var(--text);line-height:1.2;margin-bottom:.6rem}
.hero h1 em{color:var(--accent);font-style:normal}
.hero p{color:var(--muted);font-size:.85rem;font-weight:300;line-height:1.75;max-width:460px}
.tabs{display:flex;gap:.5rem;margin-bottom:2.5rem;flex-wrap:wrap}
.tab{background:none;border:1px solid var(--border);font-family:var(--en);font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:.45rem 1.1rem;cursor:pointer;border-radius:2rem;transition:all .2s}
.tab.on{background:var(--accent2);border-color:var(--accent2);color:#fff}
.tab:hover:not(.on){border-color:rgba(255,255,255,.15);color:var(--text)}
.sec{margin-bottom:3rem}
.sec-hd{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem}
.sec-lb{font-size:.62rem;color:var(--muted);letter-spacing:.22em;text-transform:uppercase}
.sec-line{flex:1;height:1px;background:var(--border)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem}
.card{background:rgba(255,255,255,.02);border:1px solid var(--border);transition:border-color .2s,transform .2s;text-decoration:none;display:block;overflow:hidden}
.card:hover{border-color:rgba(255,255,255,.12);transform:translateY(-2px)}
.card-thumb{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:#0d1629;filter:saturate(.8)}
.card-thumb-placeholder{width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,#0d1629,#152035);display:flex;align-items:center;justify-content:center}
.card-thumb-placeholder svg{opacity:.15;width:40px;height:40px}
.card-body{padding:1rem 1.1rem 1.2rem}
.card-cat{font-size:.55rem;color:var(--accent);letter-spacing:.18em;text-transform:uppercase;margin-bottom:.4rem}
.card-title{font-size:.92rem;color:var(--text);font-weight:500;line-height:1.4;margin-bottom:.35rem}
.card-desc{font-size:.75rem;color:var(--muted);line-height:1.6;font-weight:300;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-link{display:inline-flex;align-items:center;gap:.35rem;margin-top:.75rem;font-size:.62rem;color:var(--accent2);letter-spacing:.1em;text-transform:uppercase}
.card-link svg{width:10px;height:10px;flex-shrink:0}
.empty{font-size:.8rem;color:var(--muted);font-style:italic;padding:2rem 0}
.loading{display:flex;gap:.4rem;align-items:center;padding:3rem 0;color:var(--muted);font-size:.8rem}
.dot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:blink 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border)}
@media(max-width:600px){nav{padding:0 1rem}.nb{padding:.4rem .6rem;font-size:.62rem}.main{padding:2rem 1.2rem 5rem}.nlen{display:none}}
</style>
</head>
<body>
<div id="bgwrap" style="position:fixed;top:0;left:0;width:100vw;height:100vh;height:100dvh;z-index:0;pointer-events:none;background:url('https://images7.alphacoders.com/131/thumb-1920-1316304.jpeg') center/cover no-repeat fixed;filter:brightness(.32) saturate(.75)"></div>
<div class="wrap">
<nav>
  <a class="nav-logo" href="index.html">
    <div class="nljp">夢字幕</div>
    <div class="nlen">YumeSubs</div>
  </a>
  <div class="nav-links">
    <a class="nb" href="index.html">Katalog</a>
    <a class="nb on" href="resources.html">Resources</a>
    <a class="nb" href="stories.html">Cerita</a>
    <a class="nb" href="contact.html">Hubungi</a>
  </div>
</nav>

<div class="main">
  <div class="hero">
    <div class="eyebrow">Rekomendasi</div>
    <h1>Aplikasi, Video &<br><em>Tools</em> pilihan</h1>
    <p>Kumpulan rekomendasi yang berguna buat kamu yang suka budaya Jepang, belajar bahasa, atau sekadar cari hiburan.</p>
  </div>

  <div class="tabs">
    <button class="tab on" onclick="filterCat('all')">Semua</button>
    <button class="tab" onclick="filterCat('Aplikasi')">Aplikasi</button>
    <button class="tab" onclick="filterCat('Video')">Video</button>
    <button class="tab" onclick="filterCat('Tools')">Tools</button>
  </div>

  <div id="content">
    <div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  </div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const db = getFirestore(initializeApp({
  apiKey:"AIzaSyA3dKYhDxX3DE5CAI_yQbjvUUdsBR0QeS8",
  authDomain:"yumesubs7.firebaseapp.com",
  projectId:"yumesubs7",
  storageBucket:"yumesubs7.firebasestorage.app",
  messagingSenderId:"1076202015626",
  appId:"1:1076202015626:web:ce89fb668eb6b2bd021673"
}));

let allItems = [];
let activeCat = 'all';

const CATS = ['Aplikasi','Video','Tools'];

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function thumbHTML(item) {
  if (item.thumb) return `<img class="card-thumb" src="${esc(item.thumb)}" alt="${esc(item.title)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="card-thumb-placeholder" style="display:none"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>`;
  return `<div class="card-thumb-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>`;
}

function renderCard(item) {
  return `<a class="card" href="${esc(item.link)}" target="_blank" rel="noopener">
    ${thumbHTML(item)}
    <div class="card-body">
      <div class="card-cat">${esc(item.category)}</div>
      <div class="card-title">${esc(item.title)}</div>
      <div class="card-desc">${esc(item.desc||'')}</div>
      <div class="card-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>Buka</div>
    </div>
  </a>`;
}

function render() {
  const el = document.getElementById('content');
  const cats = activeCat === 'all' ? CATS : [activeCat];
  let html = '';
  for (const cat of cats) {
    const items = allItems.filter(i => i.category === cat);
    if (activeCat === 'all' && !items.length) continue;
    html += `<div class="sec">
      <div class="sec-hd"><div class="sec-lb">${esc(cat)}</div><div class="sec-line"></div></div>
      ${items.length ? `<div class="grid">${items.map(renderCard).join('')}</div>` : '<div class="empty">Belum ada item di kategori ini.</div>'}
    </div>`;
  }
  el.innerHTML = html || '<div class="empty">Belum ada konten.</div>';
}

window.filterCat = cat => {
  activeCat = cat;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  event.target.classList.add('on');
  render();
};

onSnapshot(query(collection(db,'resources'), orderBy('order','asc')), snap => {
  allItems = snap.docs.map(d => ({id:d.id,...d.data()}));
  render();
});
</script>
</body>
</html>
