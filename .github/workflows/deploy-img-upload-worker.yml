# Deploy Cloudflare Worker untuk upload cover ke ImgBB.
# GitHub Secrets:
#   CF_API_TOKEN   — sudah ada di repo
#   IMGBB_API_KEY  — tambahkan dari https://api.imgbb.com/
#
# CARA UPLOAD KE GITHUB:
#   Taruh file ini di: .github/workflows/deploy-img-upload-worker.yml
#   (BUKAN di root repo — harus di dalam folder .github/workflows/)

name: Deploy ImgBB Upload Worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'cloudflare-worker/**'
      - '.github/workflows/deploy-img-upload-worker.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare-worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve Cloudflare Account ID
        id: cf
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          if [ -z "$CF_API_TOKEN" ]; then
            echo "::error::Secret CF_API_TOKEN belum di-set"
            exit 1
          fi
          ACCOUNT_ID=$(curl -fsS \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts" \
            | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{const j=JSON.parse(d);if(!j.success||!j.result?.[0]?.id){console.error('Gagal ambil Account ID:',d);process.exit(1)}console.log(j.result[0].id)})")
          echo "account_id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"

      - name: Install Wrangler
        run: npm install

      - name: Set ImgBB secret on Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.cf.outputs.account_id }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
        run: |
          if [ -z "$IMGBB_API_KEY" ]; then
            echo "::error::Secret IMGBB_API_KEY belum di-set — buat di Settings → Secrets → New repository secret"
            exit 1
          fi
          printf '%s' "$IMGBB_API_KEY" | npx wrangler secret put IMGBB_API_KEY

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ steps.cf.outputs.account_id }}
          command: deploy
          workingDirectory: cloudflare-worker

      - name: Health check
        run: |
          sleep 3
          curl -fsS "https://rough-snowflake-e4dc.khoirustsani143.workers.dev/health" | tee health.json
          node -e "const j=require('./health.json'); if(!j.ok||!j.imgbb_configured) process.exit(1)"
