<script type="module">
import { initializeApp }    from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, query, where, orderBy, getDocs }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA3dKYhDxX3DE5CAI_yQbjvUUdsBR0QeS8",
  authDomain: "yumesubs7.firebaseapp.com",
  projectId: "yumesubs7",
  storageBucket: "yumesubs7.firebasestorage.app",
  messagingSenderId: "1076202015626",
  appId: "1:1076202015626:web:ce89fb668eb6b2bd021673"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

let songs = [];
let cur   = null;
let sro   = true, str = true;

// ── Helpers ──
function norm(s){
  return String(s||'').toLowerCase()
    .replace(/[.,\-–—!?'"()[\]{}]/g,' ')
    .replace(/\s+/g,' ').trim();
}
function matches(s, q){
  const nq = norm(q);
  if(!nq) return true;
  const allRo = (s.lyrics||[]).map(l=>l.ro).join(' ');
  const allId = (s.lyrics||[]).map(l=>l.id).join(' ');
  return [s.titleJp,s.titleRo,s.titleId,s.artist,allRo,allId].some(f=>norm(f).includes(nq));
}
function toast(m){
  const t=document.getElementById('toast');
  t.textContent=m; t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),2800);
}

// ── Render catalog ──
function rc(filter=''){
  const q = filter.trim();
  const filtered = q ? songs.filter(s=>matches(s,q)) : songs;
  document.getElementById('songGrid').innerHTML = filtered.map((s,i)=>`
    <div class="sc" data-id="${s.id}" onclick="_os('${s.id}')">
      <img src="${s.img||''}" alt="${s.titleJp}" onerror="this.src='https://placehold.co/400x400/0d0c1a/333?text=%E2%99%AA'">
      <div class="scb">
        <div class="scn">0${i+1}</div>
        <div class="scjp">${s.titleJp}</div>
        ${s.titleRo?`<div class="scro">${s.titleRo}</div>`:''}
        <div class="scid">${s.titleId||''}</div>
        <div class="scf"><div class="scar">${s.artist}</div><div class="scarr">&#x2192;</div></div>
      </div>
    </div>`).join('');
  document.getElementById('noResult').style.display =
    (filtered.length===0 && songs.length>0) ? 'block' : 'none';
}

// ── Search ──
window.onSearch = val => {
  rc(val);
  document.getElementById('searchClear').classList.toggle('vis', val.length>0);
};
window.clearSearch = () => {
  document.getElementById('searchInp').value='';
  document.getElementById('searchClear').classList.remove('vis');
  rc();
};

// ── View switcher ──
window.sv = v => {
  document.getElementById('catView').style.display  = v==='cat'?'block':'none';
  const lv = document.getElementById('lyrView');
  lv.style.display = v==='lyr'?'block':'none';
  lv.classList.toggle('on', v==='lyr');
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  if(v==='cat') document.getElementById('nb-cat').classList.add('on');
  if(v!=='lyr') document.getElementById('ytf').src='';
  window.scrollTo({top:0,behavior:'smooth'});
};

// ── Slug generator (sama dengan generate-songs.js) ──
function toSlug(titleRo, docId) {
  if (titleRo) {
    return titleRo.toLowerCase().replace(/[^a-z0-9\s-]/g,'').trim().replace(/\s+/g,'-').replace(/-+/g,'-').substring(0,60);
  }
  return docId;
}

// ── Open song → redirect ke halaman statis ──
window._os = id => {
  const s = songs.find(x=>x.id===id);
  if(!s) return;
  const slug = toSlug(s.titleRo, s.id);
  window.location.href = '/lagu/' + slug + '.html';
};

// ── Toggle romaji/terjemahan ──
window.tl = t => {
  if(t==='ro'){
    sro=!sro;
    document.getElementById('tp-ro').classList.toggle('on',sro);
    document.querySelectorAll('.lro').forEach(e=>e.classList.toggle('h',!sro));
  } else {
    str=!str;
    document.getElementById('tp-tr').classList.toggle('on',str);
    document.querySelectorAll('.lid').forEach(e=>e.classList.toggle('h',!str));
  }
};

// ── Comments ──
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderComment(id, c, replies){
  const isAdm = !!c.isAdmin;
  const repHtml = replies.length ? `<div class="replies">${replies.map(r=>{
    const ra = !!r.isAdmin;
    if(ra) return `<div class="admin-reply-block">
      <div class="admin-badge-wrap">
        <span class="admin-badge">Admin</span>
        <span class="admin-name">YumeSubs</span>
      </div>
      <div class="admin-reply-text">${esc(r.text)}</div>
    </div>`;
    return `<div class="ritem">
      <div class="chdr">
        <div class="chdr-left">
          <div class="cname">${esc(r.name)}</div>
          <div class="cdate">${esc(r.date)}</div>
        </div>
      </div>
      <div class="ctxt">${esc(r.text)}</div>
    </div>`;
  }).join('')}</div>` : '';
  return `<div class="citem${isAdm?' is-admin':''}" id="cm-${id}">
    <div class="chdr">
      <div class="chdr-left">
        <div class="cname">${esc(c.name)}</div>
        ${isAdm?'<span class="admin-badge">Admin</span>':''}
        <div class="cdate">${esc(c.date)}</div>
      </div>
      <button class="reply-btn" onclick="toggleReplyForm('${id}')">↩ Balas</button>
    </div>
    <div class="ctxt">${esc(c.text)}</div>
    ${repHtml}
    <div class="reply-form" id="rf-${id}">
      <div class="reply-row">
        <input class="cmi" id="rn-${id}" placeholder="Nama (opsional)">
        <button class="rbtn-cancel" onclick="toggleReplyForm('${id}')">✕</button>
      </div>
      <textarea class="cmi" id="rt-${id}" rows="2" placeholder="Balas komentar ini..."></textarea>
      <button class="sbtn" style="padding:.55rem 1rem;align-self:flex-start" onclick="postReply('${id}')">Kirim Balasan</button>
    </div>
  </div>`;
}

async function rcm(songId){
  const el = document.getElementById('cmlist');
  el.innerHTML = '<div class="nocm">Memuat komentar...</div>';
  try {
    const allQ = query(collection(db,'comments'), where('songId','==',songId));
    const allSnap = await getDocs(allQ);
    const allDocs = allSnap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.ts?.seconds||0)-(a.ts?.seconds||0));
    if(allDocs.length===0){ el.innerHTML='<div class="nocm">Belum ada komentar. Jadi yang pertama!</div>'; return; }
    const parents = allDocs.filter(c=>!c.parentId);
    const replyMap = {};
    allDocs.filter(c=>!!c.parentId).forEach(r=>{
      if(!replyMap[r.parentId]) replyMap[r.parentId]=[];
      replyMap[r.parentId].push(r);
    });
    if(parents.length===0){ el.innerHTML='<div class="nocm">Belum ada komentar. Jadi yang pertama!</div>'; return; }
    el.innerHTML = parents.map(c=>renderComment(c.id, c, replyMap[c.id]||[])).join('');
  } catch(e){
    el.innerHTML='<div class="nocm">Gagal memuat komentar.</div>';
  }
}

window.toggleReplyForm = id => {
  const rf = document.getElementById('rf-'+id);
  rf.classList.toggle('open');
  if(rf.classList.contains('open')) document.getElementById('rt-'+id).focus();
};

window.postReply = async parentId => {
  const t = document.getElementById('rt-'+parentId).value.trim();
  if(!t) return;
  const n = document.getElementById('rn-'+parentId).value.trim();
  try {
    await addDoc(collection(db,'comments'), {
      songId: cur, parentId,
      name: n||'Anonim', text: t,
      date: new Date().toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}),
      ts: Date.now(), isAdmin: false
    });
    toast('Balasan terkirim!');
    rcm(cur);
  } catch(e){ toast('Gagal kirim.'); }
};

window.postCm = async () => {
  const n   = document.getElementById('cm-n').value.trim();
  const t   = document.getElementById('cm-t').value.trim();
  const btn = document.getElementById('cm-btn');
  if(!t || !cur) return;
  btn.disabled = true;
  try {
    await addDoc(collection(db,'comments'), {
      songId: cur, parentId: null,
      name: n||'Anonim', text: t,
      date: new Date().toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}),
      ts: Date.now(), isAdmin: false
    });
    document.getElementById('cm-t').value = '';
    rcm(cur);
    toast('Komentar terkirim!');
  } catch(e){
    toast('Gagal kirim komentar.');
  }
  btn.disabled = false;
};

// ── Load songs (realtime) ──
onSnapshot(
  query(collection(db,'songs'), orderBy('order','asc')),
  snap => {
    songs = snap.docs.map(d=>({id:d.id, ...d.data()}));
    rc(document.getElementById('searchInp').value||'');
  },
  () => {
    document.getElementById('songGrid').innerHTML =
      '<div class="loading-msg">Gagal memuat data. Coba refresh.</div>';
  }
);

sv('cat');
</script>
<script>
// Fix background gap saat Chrome address bar hide/show
function fixBg() {
  const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  const w = window.visualViewport ? window.visualViewport.width : window.innerWidth;
  const bg = document.getElementById('bgwrap');
  if (bg) { bg.style.height = h + 'px'; bg.style.width = w + 'px'; }
  document.body.style.minHeight = h + 'px';
}
fixBg();
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', fixBg);
  window.visualViewport.addEventListener('scroll', fixBg);
}
window.addEventListener('resize', fixBg);
</script>
<script>
document.addEventListener('copy', function(e) {
  const selected = window.getSelection().toString();
  if (selected.length > 10) {
    e.clipboardData.setData('text/plain', selected + '\n\n© YumeSubs — yumelyrics.github.io');
    e.preventDefault();
  }
});
</script>
