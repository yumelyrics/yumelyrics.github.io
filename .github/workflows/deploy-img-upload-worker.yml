# Deploy Cloudflare Worker untuk upload cover ke ImgBB.
#
# GitHub Secrets wajib:
#   CF_API_TOKEN   — HARUS punya permission: Account → Workers Scripts → Edit
#   CF_ZONE_ID     — sudah ada
#   IMGBB_API_KEY  — dari https://api.imgbb.com/
#
# Kalau deploy masih gagal, pakai cara manual di Cloudflare Dashboard
# (lihat komentar di bawah step Deploy Worker).

name: Deploy ImgBB Upload Worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'cloudflare-worker/**'
      - '.github/workflows/deploy-img-upload-worker.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare-worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cek secret wajib
        env:
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
        run: |
          if [ -z "$IMGBB_API_KEY" ]; then
            echo "::error::Secret IMGBB_API_KEY belum ada di GitHub → Settings → Secrets → Actions"
            exit 1
          fi
          echo "IMGBB_API_KEY: OK (terisi)"

      - name: Resolve Cloudflare Account ID
        id: cf
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CF_API_TOKEN" ]; then
            echo "::error::Secret CF_API_TOKEN belum di-set"
            exit 1
          fi
          ACCOUNT_ID=$(node <<'NODE'
          const token = process.env.CF_API_TOKEN;
          const zoneId = process.env.CF_ZONE_ID || '';
          const preset = process.env.CLOUDFLARE_ACCOUNT_ID || '';
          async function cfGet(url) {
            const res = await fetch(url, { headers: { Authorization: 'Bearer ' + token } });
            const json = await res.json().catch(() => ({}));
            if (!res.ok || !json.success) throw new Error('Cloudflare API gagal: ' + JSON.stringify(json));
            return json;
          }
          (async () => {
            if (preset) { console.log(preset); return; }
            if (zoneId) {
              const z = await cfGet('https://api.cloudflare.com/client/v4/zones/' + zoneId);
              const id = z.result?.account?.id;
              if (id) { console.log(id); return; }
            }
            const a = await cfGet('https://api.cloudflare.com/client/v4/accounts');
            const id = a.result?.[0]?.id;
            if (id) { console.log(id); return; }
            console.error('Account ID tidak ketemu.');
            process.exit(1);
          })().catch((e) => { console.error(e.message || e); process.exit(1); });
          NODE
          )
          echo "account_id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"

      - name: Cek permission Workers pada token
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ steps.cf.outputs.account_id }}
        run: |
          node <<'NODE'
          const token = process.env.CF_API_TOKEN;
          const accountId = process.env.CF_ACCOUNT_ID;
          fetch('https://api.cloudflare.com/client/v4/accounts/' + accountId + '/workers/scripts', {
            headers: { Authorization: 'Bearer ' + token },
          }).then(async (res) => {
            const json = await res.json().catch(() => ({}));
            if (!res.ok || !json.success) {
              console.error('Token TIDAK punya akses Workers Scripts.');
              console.error('Buat token baru: Cloudflare → API Tokens → Edit Cloudflare Workers');
              console.error('Lalu ganti secret CF_API_TOKEN di GitHub.');
              console.error('Detail:', JSON.stringify(json));
              process.exit(1);
            }
            console.log('Workers permission: OK');
          });
          NODE

      - name: Install Wrangler
        run: npm install

      # Deploy dulu TANPA secret (worker harus ada dulu)
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ steps.cf.outputs.account_id }}
          workingDirectory: cloudflare-worker
          command: deploy

      # Set secret SETELAH worker sudah ter-deploy
      - name: Set ImgBB secret on Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.cf.outputs.account_id }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
        run: |
          printf '%s' "$IMGBB_API_KEY" | npx wrangler secret put IMGBB_API_KEY

      - name: Health check
        run: |
          sleep 5
          curl -fsS "https://rough-snowflake-e4dc.khoirustsani143.workers.dev/health" | tee health.json
          node -e "const j=require('./health.json'); console.log(j); if(!j.ok||!j.imgbb_configured) process.exit(1)"
