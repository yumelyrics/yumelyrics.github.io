name: Generate Song Pages

on:
  # Jalankan otomatis setiap hari jam 06.00 WIB (23.00 UTC)
  schedule:
    - cron: '0 23 * * *'
  # Atau bisa trigger manual dari tab Actions di GitHub
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install firebase

      - name: Generate halaman lagu, artis & sitemap
        run: node generate-songs.js
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}

      - name: Commit & push hasil generate
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lagu/ artis/ sitemap.xml robots.txt
          git diff --cached --quiet || git commit -m "chore: auto-generate halaman lagu & artis [skip ci]"
          git push
