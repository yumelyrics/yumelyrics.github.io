name: Deploy 404 page to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site output
        run: |
          mkdir -p site
          cp 404.html site/404.html
          cp 404.html site/index.html
          if [ -f anime404.mp3 ]; then cp anime404.mp3 site/anime404.mp3; fi

      - name: Inject alamat backend report
        env:
          # Ini BUKAN webhook Discord — hanya alamat endpoint server kita sendiri
          # (mis. https://nama-app-kamu.replit.app/api/visitor-report).
          # Webhook Discord aslinya sekarang tersimpan rahasia di server itu,
          # tidak pernah dikirim ke browser pengunjung.
          VISITOR_REPORT_ENDPOINT: ${{ secrets.VISITOR_REPORT_ENDPOINT }}
        run: |
          if [ -z "$VISITOR_REPORT_ENDPOINT" ]; then
            echo "Secret VISITOR_REPORT_ENDPOINT belum diset — notifikasi tidak aktif."
          else
            ESCAPED=$(printf '%s\n' "$VISITOR_REPORT_ENDPOINT" | sed -e 's/[\/&]/\\&/g')
            sed -i "s|__VISITOR_REPORT_ENDPOINT__|$ESCAPED|g" site/404.html
            sed -i "s|__VISITOR_REPORT_ENDPOINT__|$ESCAPED|g" site/index.html
            echo "Endpoint berhasil disisipkan."
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
