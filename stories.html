<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>(function(){if(localStorage.getItem('ym_theme')==='dark')document.documentElement.setAttribute('data-theme','dark');})()</script>
<title>Cerita — YumeSubs</title>
<link rel="icon" type="image/jpeg" href="anime_icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Syne:wght@400;600;700;800&family=Noto+Serif+JP:wght@300;400;600&display=swap" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Syne:wght@400;600;700;800&family=Noto+Serif+JP:wght@300;400;600&display=swap"></noscript>
<style>
/* ── TOKENS (Light Mode) ── */
:root {
  --ink:    #0a0812;
  --paper:  #f5f0ea;
  --cream:  #ede7dc;
  --smoke:  #c8bfb0;
  --ash:    #8c8278;
  --gold:   #c9a96e;
  --gold2:  #e8c98a;
  --rose:   #c4637a;
  --plum:   #7c4d6e;
  --mist:   rgba(10,8,18,.06);
  --serif:  'Cormorant Garamond', Georgia, serif;
  --sans:   'Syne', sans-serif;
  --jp:     'Noto Serif JP', serif;

  /* Semantic */
  --bg:         var(--paper);
  --bg-card:    rgba(10,8,18,.03);
  --bg-card-hover: rgba(201,169,110,.05);
  --border:     rgba(10,8,18,.09);
  --border-hover: rgba(10,8,18,.22);
  --text:       var(--ink);
  --muted:      var(--ash);
  --faint:      var(--smoke);
  --accent:     var(--rose);
  --accent-alt: var(--gold);
  --tag-curhat-c: #7c4d6e; --tag-curhat-b: rgba(124,77,110,.18);
  --tag-review-c: #4a7c59; --tag-review-b: rgba(74,124,89,.15);
  --tag-opini-c:  #3a5f8a; --tag-opini-b:  rgba(58,95,138,.15);
  --tag-random-c: #8a5a3a; --tag-random-b: rgba(138,90,58,.15);
  --input-bg:   rgba(10,8,18,.04);
  --input-border: rgba(10,8,18,.15);
  --nav-bg:     rgba(245,240,234,.92);
  --nav-border: rgba(10,8,18,.09);
  --footer-bg:  var(--ink);
  --footer-text: rgba(200,191,176,.55);
  --grain-op:   .42;
  --bg-main:    var(--paper);
}

[data-theme="dark"] {
  --ink:        #e8e2d9;
  --paper:      #0f0d0b;
  --cream:      #1a1714;
  --smoke:      #4a4540;
  --ash:        #7a7068;
  --gold:       #d4a96e;
  --gold2:      #e8c98a;
  --rose:       #d4758a;
  --bg:         var(--paper);
  --bg-card:    rgba(232,226,217,.03);
  --bg-card-hover: rgba(201,169,110,.06);
  --border:     rgba(232,226,217,.1);
  --border-hover: rgba(201,169,110,.35);
  --text:       var(--ink);
  --muted:      var(--ash);
  --faint:      var(--smoke);
  --accent:     var(--rose);
  --accent-alt: var(--gold);
  --tag-curhat-c: #c084d4; --tag-curhat-b: rgba(192,132,212,.12);
  --tag-review-c: #6ecf92; --tag-review-b: rgba(110,207,146,.1);
  --tag-opini-c:  #7ab4f0; --tag-opini-b:  rgba(122,180,240,.1);
  --tag-random-c: #f0b484; --tag-random-b: rgba(240,180,132,.1);
  --input-bg:   rgba(232,226,217,.04);
  --input-border: rgba(232,226,217,.12);
  --nav-bg:     rgba(15,13,11,.92);
  --nav-border: rgba(232,226,217,.1);
  --footer-bg:  #070604;
  --footer-text: rgba(200,191,176,.45);
  --grain-op:   .18;
  --bg-main:    var(--paper);
}
[data-theme="dark"] body{background:var(--paper);color:var(--ink)}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;background:var(--bg-main)}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
  transition:background .3s, color .3s;
}

/* ── GRAIN OVERLAY ── */
body::before{
  content:'';
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
  opacity:var(--grain-op);
  transition:opacity .3s;
}

.wrap{position:relative;z-index:1}

/* ── NAV (sama index.html) ── */
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1.2rem 3rem;min-width:0;background:rgba(245,240,234,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--nav-border);isolation:isolate;transition:background .3s,border-color .3s}
[data-theme="dark"] nav{background:var(--nav-bg)}
.nav-logo{display:flex;flex-direction:column;gap:.05rem;text-decoration:none;cursor:pointer;flex-shrink:0;min-width:0}
.nljp{font-family:var(--jp);font-size:1.05rem;font-weight:600;color:var(--ink);white-space:nowrap;line-height:1;letter-spacing:.1em}
.nlen{font-size:.55rem;color:var(--ash);letter-spacing:.3em;text-transform:uppercase;white-space:nowrap;line-height:1;font-weight:700}
.nav-links{display:flex;gap:.25rem;align-items:center;flex-shrink:0}
#nav-menu-btn{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;background:none;border:1px solid var(--border);cursor:pointer;flex-shrink:0;flex-direction:column;padding:0}
#nav-menu-btn span{display:block;width:14px;height:1.5px;background:var(--ash);transition:transform .25s ease,opacity .2s ease,width .25s ease}
#nav-menu-btn span:nth-child(2){margin:3px 0}
#nav-menu-btn.open span:nth-child(1){transform:translateY(4.5px) rotate(45deg)}
#nav-menu-btn.open span:nth-child(2){opacity:0;width:0}
#nav-menu-btn.open span:nth-child(3){transform:translateY(-4.5px) rotate(-45deg)}
#nav-dropdown{position:absolute;top:calc(100% + 1px);right:3rem;z-index:200;background:var(--paper);border:1px solid var(--border);display:none;flex-direction:column;min-width:160px;max-width:calc(100vw - 2rem);box-shadow:0 8px 32px rgba(10,8,18,.1)}
[data-theme="dark"] #nav-dropdown{background:var(--cream)}
#nav-dropdown.open{display:flex}
.nd-item{font-family:var(--sans);font-size:.68rem;color:var(--ash);letter-spacing:.18em;text-transform:uppercase;padding:.75rem 1.2rem;width:100%;font-weight:600;text-decoration:none;display:block;white-space:nowrap}
.nd-item:hover,.nd-item.on{color:var(--ink);background:var(--cream)}
#theme-toggle{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;background:none;border:1px solid var(--border);cursor:pointer;position:relative;overflow:hidden;padding:0;flex-shrink:0}
#theme-toggle svg{width:14px;height:14px;stroke:var(--ash);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;position:absolute}
#theme-toggle .icon-sun{opacity:1}
#theme-toggle .icon-moon{opacity:0}
[data-theme="dark"] #theme-toggle .icon-sun{opacity:0}
[data-theme="dark"] #theme-toggle .icon-moon{opacity:1}
[data-theme="dark"] #theme-toggle{border-color:rgba(232,226,217,.3)}
[data-theme="dark"] #theme-toggle svg{stroke:rgba(232,226,217,.75)}

/* ── HERO ── */
.hero{
  padding:4.5rem 3rem 2.5rem;
  max-width:860px;
  position:relative;
}
.hero::before{
  content:'文';
  position:absolute;right:3rem;top:3rem;
  font-family:var(--jp);font-size:10rem;font-weight:600;
  color:rgba(10,8,18,.04);line-height:1;pointer-events:none;
  user-select:none;
}
[data-theme="dark"] .hero::before{color:rgba(255,255,255,.03)}

.eyebrow{
  font-size:.56rem;font-weight:700;letter-spacing:.35em;text-transform:uppercase;
  color:var(--rose);margin-bottom:1.2rem;
  display:flex;align-items:center;gap:.6rem;
}
.eyebrow::before{content:'';width:2rem;height:1px;background:var(--rose);display:block}

.hero h1{
  font-family:var(--serif);font-size:clamp(2.4rem,5vw,3.8rem);
  font-weight:300;font-style:italic;
  line-height:1.15;color:var(--text);margin-bottom:.8rem;
}
.hero h1 em{color:var(--gold);font-style:normal}
.hero p{color:var(--muted);font-size:.85rem;font-weight:400;max-width:440px;line-height:1.8}

/* ── DIVIDER ── */
.section-divider{
  display:flex;align-items:center;gap:2rem;
  padding:0 3rem;margin:0;
}
.divider-line{flex:1;height:1px;background:var(--border)}
.divider-ornament{
  font-family:var(--serif);font-size:.85rem;font-weight:300;font-style:italic;
  color:var(--muted);white-space:nowrap;letter-spacing:.1em;
}

/* ── FILTER TAGS ── */
.filter-wrap{
  padding:0 3rem 2.5rem;
  display:flex;gap:.5rem;flex-wrap:wrap;
  align-items:center;
}
.filter-label{
  font-size:.52rem;font-weight:700;letter-spacing:.25em;text-transform:uppercase;
  color:var(--faint);margin-right:.25rem;
}
.ftag{
  background:none;border:1px solid var(--border);
  font-family:var(--sans);font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--muted);padding:.32rem .85rem;cursor:pointer;
  transition:all .2s;border-radius:0;
}
.ftag.on{background:var(--ink);border-color:var(--ink);color:var(--paper)}
[data-theme="dark"] .ftag.on{background:var(--gold);border-color:var(--gold);color:#0a0812}
.ftag:hover:not(.on){border-color:var(--border-hover);color:var(--text)}

/* ── STORY GRID ── */
.story-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:1.5px;
  padding:0 3rem 6rem;
  border-top:1px solid var(--border);
  background:var(--border);
}
.story-grid > *{background:var(--bg)}

.scard{
  background:var(--bg);
  cursor:pointer;
  transition:background .2s;
  overflow:hidden;
  display:flex;flex-direction:column;
  text-decoration:none;
  color:inherit;
}
.scard:hover{background:var(--bg-card-hover)}

.scard-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;filter:sepia(.1) contrast(1.02);transition:filter .3s}
.scard:hover .scard-img{filter:sepia(.05) contrast(1.05)}

.scard-body{padding:1.5rem;flex:1;display:flex;flex-direction:column}
.scard-tags{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.85rem}

.stag-pill{
  font-size:.52rem;letter-spacing:.12em;text-transform:uppercase;
  padding:.2rem .6rem;border:1px solid;
}
.stag-curhat{color:var(--tag-curhat-c);border-color:var(--tag-curhat-b);background:var(--tag-curhat-b)}
.stag-review{color:var(--tag-review-c);border-color:var(--tag-review-b);background:var(--tag-review-b)}
.stag-opini{ color:var(--tag-opini-c); border-color:var(--tag-opini-b); background:var(--tag-opini-b)}
.stag-random{color:var(--tag-random-c);border-color:var(--tag-random-b);background:var(--tag-random-b)}
.stag-default{color:var(--muted);border-color:var(--border);background:transparent}

.scard-title{
  font-family:var(--serif);font-size:1.2rem;font-weight:400;
  color:var(--text);line-height:1.35;margin-bottom:.5rem;
}
.scard-excerpt{
  font-size:.8rem;color:var(--muted);font-weight:400;line-height:1.75;flex:1;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}
.scard-footer{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:1.2rem;padding-top:.9rem;border-top:1px solid var(--border);
}
.scard-date{font-size:.58rem;color:var(--faint);letter-spacing:.05em}
.scard-arrow{
  font-size:.72rem;color:var(--faint);transition:transform .2s,color .2s;
  font-family:var(--serif);
}
.scard:hover .scard-arrow{transform:translateX(4px);color:var(--gold)}

.scard.pinned{border-top:2px solid var(--gold)}
.pin-badge{
  display:inline-flex;align-items:center;gap:.3rem;
  font-size:.52rem;color:var(--gold);letter-spacing:.15em;text-transform:uppercase;
  background:rgba(201,169,110,.1);border:1px solid rgba(201,169,110,.25);
  padding:.15rem .55rem;margin-bottom:.6rem;width:fit-content;
}
.verified-badge{
  display:inline-flex;align-items:center;gap:.3rem;
  font-size:.52rem;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;
  background:rgba(140,130,120,.08);border:1px solid var(--border);
  padding:.15rem .55rem;margin-bottom:.6rem;width:fit-content;margin-left:.4rem;
}

.no-story,.loading-msg{
  padding:3rem;color:var(--muted);font-size:.82rem;
  font-family:var(--serif);font-style:italic;
}

/* ── DETAIL VIEW ── */
#detailView{display:none;padding:0 3rem 6rem;animation:fu .35s ease}
#detailView.on{display:block}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.dback{
  display:flex;align-items:center;gap:1rem;
  padding:1.5rem 0 2.5rem;border-bottom:1px solid var(--border);margin-bottom:2.5rem;
}
.gbtn{
  background:none;border:1px solid var(--border);
  font-family:var(--sans);font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--muted);padding:.45rem 1.1rem;cursor:pointer;transition:all .2s;
}
.gbtn:hover{border-color:var(--gold);color:var(--gold)}

.darticle{max-width:680px}
.darticle-tags{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1.4rem}
.darticle-title{
  font-family:var(--serif);font-size:clamp(1.8rem,4vw,2.8rem);
  font-weight:300;font-style:italic;
  line-height:1.2;color:var(--text);margin-bottom:.75rem;
}
.darticle-meta{
  font-size:.65rem;color:var(--muted);margin-bottom:2.5rem;
  display:flex;gap:1.5rem;align-items:center;flex-wrap:wrap;
  letter-spacing:.08em;
}
.darticle-img{
  width:100%;max-height:420px;object-fit:cover;
  border:1px solid var(--border);margin-bottom:2.5rem;
  display:block;filter:sepia(.1) contrast(1.02);
}
.darticle-body{font-size:.92rem;color:var(--text);line-height:1.9;font-weight:400}
.darticle-body p{margin-bottom:1.3rem}
.darticle-body a{color:var(--gold);text-decoration:none;border-bottom:1px solid rgba(201,169,110,.3);transition:border-color .2s}
.darticle-body a:hover{border-color:var(--gold)}
.darticle-body img{max-width:100%;border:1px solid var(--border);margin:1.2rem 0;display:block}
.darticle-body blockquote{
  border-left:2px solid var(--gold);padding:.5rem 0 .5rem 1.5rem;
  color:var(--muted);font-style:italic;margin:1.5rem 0;
  font-family:var(--serif);font-size:1.05rem;
}
.darticle-body strong{color:var(--rose);font-weight:600}
.darticle-body em{color:var(--text);font-style:italic;opacity:.85}

/* ── COMMENTS ── */
.dcm-sec{
  margin-top:4rem;padding-top:3rem;border-top:1px solid var(--border);max-width:600px;
}
.dcm-tit{
  font-family:var(--serif);font-size:1.6rem;font-weight:300;font-style:italic;
  color:var(--text);margin-bottom:2rem;
}

.dcm-form{display:flex;flex-direction:column;gap:.6rem;margin-bottom:2.5rem}
.cmi{
  background:none;border:none;border-bottom:1.5px solid var(--input-border);
  color:var(--text);font-family:var(--sans);font-size:.82rem;
  padding:.7rem 0;outline:none;resize:none;transition:border-color .2s;
  width:100%;
}
.cmi::placeholder{color:var(--faint)}
.cmi:focus{border-color:var(--gold)}
.cmrow{display:flex;gap:.8rem;align-items:flex-end}
.cmrow .cmi{flex:1}

.sbtn{
  background:var(--ink);border:none;
  font-family:var(--sans);font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;
  color:var(--paper);padding:.65rem 1.4rem;cursor:pointer;transition:all .2s;
  white-space:nowrap;flex-shrink:0;
}
.sbtn:hover{background:var(--gold);color:var(--ink)}
[data-theme="dark"] .sbtn{background:var(--gold);color:#0a0812}
[data-theme="dark"] .sbtn:hover{background:var(--gold2)}
.sbtn:disabled{opacity:.4;cursor:not-allowed}

.cmlist{display:flex;flex-direction:column;gap:0}

.citem{
  padding:1.5rem 0;border-bottom:1px solid var(--border);
}
.citem.is-admin{background:rgba(201,169,110,.04);padding-left:1rem;margin-left:-1rem;border-left:2px solid var(--gold)}
.chdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem;gap:.5rem;flex-wrap:wrap}
.chdr-left{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
.cname{font-size:.75rem;font-weight:700;letter-spacing:.06em;color:var(--text)}
.cdate{font-size:.6rem;color:var(--faint)}
.ctxt{font-size:.85rem;color:var(--muted);line-height:1.7;font-weight:400}

.admin-badge{
  font-size:.5rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--paper);background:var(--rose);padding:.15rem .45rem;font-weight:700;
}
[data-theme="dark"] .admin-badge{background:var(--rose);color:#fff}

.reply-btn{
  background:none;border:none;
  font-family:var(--sans);font-size:.58rem;color:var(--faint);
  letter-spacing:.12em;text-transform:uppercase;cursor:pointer;
  padding:.2rem .5rem;transition:color .2s;
}
.reply-btn:hover{color:var(--gold)}

.replies{margin-top:.9rem;padding-top:.9rem;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:.7rem}
.ritem{padding:.65rem 1rem;border-left:2px solid var(--border)}
.ritem.is-admin{border-left-color:var(--gold);background:rgba(201,169,110,.04)}

.admin-reply-block{
  display:flex;align-items:flex-start;gap:.75rem;
  border:1px solid rgba(201,169,110,.2);padding:.75rem 1rem;
  margin-top:.4rem;background:rgba(201,169,110,.04);
}
.admin-badge-wrap{display:flex;flex-direction:column;align-items:center;gap:.3rem;flex-shrink:0}
.admin-badge-wrap .admin-badge{font-size:.5rem;padding:.15rem .45rem;border-radius:0;letter-spacing:.1em}
.admin-name{font-size:.58rem;color:var(--gold);white-space:nowrap}
.admin-reply-text{font-size:.8rem;color:var(--text);line-height:1.65;flex:1}

.reply-form{margin-top:.9rem;padding-top:.9rem;border-top:1px solid var(--border);display:none;flex-direction:column;gap:.5rem}
.reply-form.open{display:flex}
.reply-row{display:flex;gap:.5rem}
.reply-row .cmi{flex:1}
.rbtn-cancel{
  background:none;border:1px solid var(--border);
  font-family:var(--sans);font-size:.6rem;color:var(--muted);
  padding:.4rem .8rem;cursor:pointer;letter-spacing:.1em;text-transform:uppercase;transition:all .2s;
}
.rbtn-cancel:hover{border-color:var(--rose);color:var(--rose)}

.nocm{font-size:.78rem;color:var(--muted);font-style:italic;font-family:var(--serif)}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:2rem;right:2rem;
  background:var(--gold);color:var(--ink);
  font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;
  padding:.7rem 1.5rem;z-index:999;
  opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;
  font-family:var(--sans);font-weight:700;
}
.toast.on{opacity:1;transform:translateY(0)}

/* ── FOOTER ── */
footer{
  background:var(--footer-bg);color:var(--footer-text);
  padding:3.5rem;
  display:flex;align-items:flex-start;justify-content:space-between;gap:3rem;
  transition:background .3s;
}
.footer-brand{display:flex;flex-direction:column;gap:.4rem}
.footer-brand-jp{font-family:var(--jp);font-size:1.35rem;font-weight:300;color:var(--gold);letter-spacing:.08em}
.footer-brand-tagline{font-size:.55rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:rgba(200,191,176,.35)}
.footer-copy{font-size:.58rem;letter-spacing:.1em;color:rgba(200,191,176,.25);margin-top:1.5rem}
.footer-links{display:flex;gap:2.5rem}
.footer-col{display:flex;flex-direction:column;gap:.75rem}
.footer-col-label{font-size:.48rem;font-weight:700;letter-spacing:.3em;text-transform:uppercase;color:rgba(200,191,176,.3);margin-bottom:.2rem}
.footer-link{font-size:.7rem;color:rgba(200,191,176,.5);text-decoration:none;transition:color .2s;letter-spacing:.04em}
.footer-link:hover{color:var(--gold)}

<!-- Theme toggle script -->
<script>
function toggleTheme(){
  const root = document.documentElement;
  const isDark = root.getAttribute('data-theme') === 'dark';
  if(isDark){
    root.removeAttribute('data-theme');
    localStorage.setItem('ym_theme','light');
  } else {
    root.setAttribute('data-theme','dark');
    localStorage.setItem('ym_theme','dark');
  }
}
function toggleNavMenu(){
  const btn = document.getElementById('nav-menu-btn');
  const dd  = document.getElementById('nav-dropdown');
  const open = dd.classList.toggle('open');
  btn.classList.toggle('open', open);
  btn.setAttribute('aria-expanded', open);
}
function closeNavMenu(){
  const btn = document.getElementById('nav-menu-btn');
  const dd  = document.getElementById('nav-dropdown');
  dd.classList.remove('open');
  btn.classList.remove('open');
  btn.setAttribute('aria-expanded', 'false');
}
document.addEventListener('click', function(e){
  const btn = document.getElementById('nav-menu-btn');
  const dd  = document.getElementById('nav-dropdown');
  if(!dd || !dd.classList.contains('open')) return;
  if(!btn.contains(e.target) && !dd.contains(e.target)) closeNavMenu();
});
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, getDocs, where }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA3dKYhDxX3DE5CAI_yQbjvUUdsBR0QeS8",
  authDomain: "yumesubs7.firebaseapp.com",
  projectId: "yumesubs7",
  storageBucket: "yumesubs7.firebasestorage.app",
  messagingSenderId: "1076202015626",
  appId: "1:1076202015626:web:ce89fb668eb6b2bd021673"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

let stories = [];
let curStory = null;
let activeFilter = 'all';

function toast(m){
  const t=document.getElementById('toast');
  t.textContent=m;t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),2800);
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

const TAG_CLASS = {curhat:'stag-curhat',review:'stag-review',opini:'stag-opini',random:'stag-random'};
const TAG_LABEL = {curhat:'💜 Curhat',review:'🎵 Review',opini:'💭 Opini',random:'✨ Random'};

function tagPill(tag){
  const cls = TAG_CLASS[tag]||'stag-default';
  const lbl = TAG_LABEL[tag]||tag;
  return `<span class="stag-pill ${cls}">${esc(lbl)}</span>`;
}

function stripMarkdown(raw){
  return raw
    .replace(/!\[([^\]]*)\]\([^\)]+\)/g, '$1')
    .replace(/\[([^\]]+)\]\([^\)]+\)/g, '$1')
    .replace(/\*\*(.+?)\*\*/g, '$1')
    .replace(/\*(.+?)\*/g, '$1')
    .replace(/^>\s?/gm, '')
    .replace(/<[^>]+>/g, '');
}

function excerpt(body){
  return stripMarkdown(body).replace(/\s+/g,' ').trim().slice(0,160);
}

function readTime(body){
  const words = stripMarkdown(body).split(/\s+/).length;
  const mins = Math.max(1, Math.round(words/200));
  return `${mins} menit baca`;
}

function renderInline(text){
  return text
    .replace(/!\[([^\]]*)\]\((https?:\/\/[^\)]+)\)/g,
      (_, alt, url) => `<img src="${esc(url)}" alt="${esc(alt)}" loading="lazy">`)
    .replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g,
      (_, t, url) => `<a href="${esc(url)}" target="_blank" rel="noopener">${esc(t)}</a>`)
    .replace(/\*\*(.+?)\*\*/g, (_, t) => `<strong>${esc(t)}</strong>`)
    .replace(/\*(.+?)\*/g, (_, t) => `<em>${esc(t)}</em>`)
    .replace(/(^|[\s])((https?:\/\/[^\s<]+))/g,
      (_, pre, url) => `${pre}<a href="${esc(url)}" target="_blank" rel="noopener">${esc(url)}</a>`);
}

function renderBody(raw){
  if(!raw) return '';
  let html = raw
    .split(/\n\n+/).map(para => {
      const trimmed = para.trim();
      if(!trimmed) return '';
      if(trimmed.startsWith('> ')){
        return `<blockquote>${renderInline(trimmed.slice(2))}</blockquote>`;
      }
      return `<p>${renderInline(trimmed)}</p>`;
    }).join('');
  return html;
}

function slug(title){
  return String(title||'').toLowerCase().trim()
    .replace(/[^\w\s-]/g,'').replace(/\s+/g,'-')
    .replace(/-+/g,'-').replace(/^-|-$/g,'');
}

function renderCard(s){
  const tags = (s.tags||[]).map(tagPill).join('');
  const imgHtml = s.img ? `<img class="scard-img" src="${esc(s.img)}" alt="" loading="lazy">` : '';
  const href = `stories/${slug(s.title)}.html`;
  const pinBadge = s.pinned ? `<div class="pin-badge">📌 Pinned</div>` : '';
  const verifBadge = s.verified ? `<span class="verified-badge">✅ Verified</span>` : '';
  return `<a class="scard${s.pinned?' pinned':''}" href="${href}" style="text-decoration:none">
    ${imgHtml}
    <div class="scard-body">
      <div style="display:flex;align-items:center;flex-wrap:wrap">${pinBadge}${verifBadge}</div>
      <div class="scard-tags">${tags}</div>
      <div class="scard-title">${esc(s.title)}</div>
      <div class="scard-excerpt">${esc(excerpt(s.body||''))}</div>
      <div class="scard-footer">
        <div class="scard-date">${esc(s.date||'')}</div>
        <div class="scard-arrow">→</div>
      </div>
    </div>
  </a>`;
}

function renderList(){
  let filtered = activeFilter==='all' ? stories : stories.filter(s=>(s.tags||[]).includes(activeFilter));
  filtered = [...filtered.filter(s=>s.pinned), ...filtered.filter(s=>!s.pinned)];
  const grid = document.getElementById('storyGrid');
  if(!filtered.length){
    grid.innerHTML='';
    document.getElementById('noStory').style.display='block';
    return;
  }
  document.getElementById('noStory').style.display='none';
  grid.innerHTML = filtered.map(renderCard).join('');
}

window.filterStories = (f, btn) => {
  activeFilter = f;
  document.querySelectorAll('.ftag').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderList();
};

window.openStory = id => {
  const s = stories.find(x=>x.id===id);
  if(!s) return;
  curStory = id;
  document.getElementById('d-tags').innerHTML = (s.tags||[]).map(tagPill).join('');
  document.getElementById('d-title').textContent = s.title||'';
  document.getElementById('d-date').textContent = s.date||'';
  document.getElementById('d-readtime').textContent = readTime(s.body||'');
  const imgEl = document.getElementById('d-img');
  if(s.img){ imgEl.src=s.img; imgEl.style.display='block'; } else { imgEl.style.display='none'; }
  document.getElementById('d-body').innerHTML = renderBody(s.body||'');
  document.getElementById('listView').style.display='none';
  const dv = document.getElementById('detailView');
  dv.style.display='block'; dv.classList.add('on');
  window.scrollTo({top:0,behavior:'smooth'});
  loadCm(id);
};

window.backToList = () => {
  document.getElementById('detailView').style.display='none';
  document.getElementById('detailView').classList.remove('on');
  document.getElementById('listView').style.display='block';
  curStory=null;
  window.scrollTo({top:0,behavior:'smooth'});
};

function renderComment(id, c, replies){
  const isAdm = !!c.isAdmin;
  const repHtml = replies.length ? `<div class="replies">${replies.map(r=>{
    const ra=!!r.isAdmin;
    if(ra) return `<div class="admin-reply-block">
      <div class="admin-badge-wrap">
        <span class="admin-badge">Admin</span>
        <span class="admin-name">YumeSubs</span>
      </div>
      <div class="admin-reply-text">${esc(r.text)}</div>
    </div>`;
    return `<div class="ritem">
      <div class="chdr"><div class="chdr-left">
        <div class="cname">${esc(r.name)}</div>
        <div class="cdate">${esc(r.date)}</div>
      </div></div>
      <div class="ctxt">${esc(r.text)}</div>
    </div>`;
  }).join('')}</div>` : '';
  return `<div class="citem${isAdm?' is-admin':''}" id="scm-${id}">
    <div class="chdr"><div class="chdr-left">
      <div class="cname">${esc(c.name)}</div>
      ${isAdm?'<span class="admin-badge">Admin</span>':''}
      <div class="cdate">${esc(c.date)}</div>
    </div>
    <button class="reply-btn" onclick="toggleRepForm('${id}')">↩ Balas</button>
    </div>
    <div class="ctxt">${esc(c.text)}</div>
    ${repHtml}
    <div class="reply-form" id="srf-${id}">
      <div class="reply-row">
        <input class="cmi" id="srn-${id}" placeholder="Nama (opsional)">
        <button class="rbtn-cancel" onclick="toggleRepForm('${id}')">✕</button>
      </div>
      <textarea class="cmi" id="srt-${id}" rows="2" placeholder="Balas..."></textarea>
      <button class="sbtn" style="padding:.55rem 1rem;align-self:flex-start" onclick="postReply('${id}')">Kirim</button>
    </div>
  </div>`;
}

async function loadCm(storyId){
  const el = document.getElementById('cmlist');
  el.innerHTML='<div class="nocm">Memuat komentar...</div>';
  try {
    const allQ = query(collection(db,'story_comments'), where('storyId','==',storyId));
    const snap = await getDocs(allQ);
    if(snap.empty){ el.innerHTML='<div class="nocm">Belum ada komentar.</div>'; return; }
    const all = snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.ts?.seconds||0)-(a.ts?.seconds||0));
    const parents = all.filter(c=>!c.parentId);
    const replyMap={};
    all.filter(c=>!!c.parentId).forEach(r=>{
      if(!replyMap[r.parentId]) replyMap[r.parentId]=[];
      replyMap[r.parentId].push(r);
    });
    if(!parents.length){ el.innerHTML='<div class="nocm">Belum ada komentar.</div>'; return; }
    el.innerHTML = parents.map(c=>renderComment(c.id,c,replyMap[c.id]||[])).join('');
  } catch(e){ console.error(e); el.innerHTML='<div class="nocm">Gagal memuat komentar.</div>'; }
}

window.toggleRepForm = id => {
  const rf=document.getElementById('srf-'+id);
  rf.classList.toggle('open');
  if(rf.classList.contains('open')) document.getElementById('srt-'+id).focus();
};

window.postReply = async parentId => {
  const t=document.getElementById('srt-'+parentId).value.trim();
  if(!t||!curStory) return;
  const n=document.getElementById('srn-'+parentId).value.trim();
  try {
    await addDoc(collection(db,'story_comments'),{
      storyId:curStory, parentId,
      name:n||'Anonim', text:t,
      date:new Date().toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}),
      ts:Date.now(), isAdmin:false
    });
    toast('Balasan terkirim!');
    loadCm(curStory);
  } catch(e){ toast('Gagal kirim.'); }
};

window.postCm = async () => {
  const n=document.getElementById('cm-n').value.trim();
  const t=document.getElementById('cm-t').value.trim();
  const btn=document.getElementById('cm-btn');
  if(!t||!curStory) return;
  btn.disabled=true;
  try {
    await addDoc(collection(db,'story_comments'),{
      storyId:curStory, parentId:null,
      name:n||'Anonim', text:t,
      date:new Date().toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}),
      ts:Date.now(), isAdmin:false
    });
    document.getElementById('cm-t').value='';
    toast('Komentar terkirim!');
    loadCm(curStory);
  } catch(e){ toast('Gagal kirim.'); }
  btn.disabled=false;
};

async function loadStories(){
  try {
    const snap = await getDocs(query(collection(db,'stories'), orderBy('ts','desc')));
    stories = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderList();
  } catch(e){
    console.error(e);
    try {
      const snap2 = await getDocs(collection(db,'stories'));
      stories = snap2.docs.map(d=>({id:d.id,...d.data()}));
      stories.sort((a,b)=>(b.ts||0)-(a.ts||0));
      renderList();
    } catch(e2){
      console.error(e2);
      document.getElementById('storyGrid').innerHTML='<div class="no-story">Belum ada cerita yang dipublish.</div>';
    }
  }
}
loadStories();
</script>

<script>
(function(){
  const MARK = '\n\n© YumeSubs — yumelyrics.my.id';
  const LIM = 10;
  function isInput(el){var t=el.tagName;return t==='INPUT'||t==='TEXTAREA';}
  document.addEventListener('contextmenu',function(e){e.preventDefault();});
  document.addEventListener('keydown',function(e){
    if((e.ctrlKey||e.metaKey)&&['a','c','u','s'].includes(e.key.toLowerCase()))e.preventDefault();
  });
  document.addEventListener('copy',function(e){
    var sel=window.getSelection().toString();
    if(sel.length>LIM){e.clipboardData.setData('text/plain',sel.substring(0,LIM)+MARK);e.preventDefault();}
  });
  document.addEventListener('selectstart',function(e){
    if(isInput(e.target))return;
    var el=e.target;
    while(el&&el!==document.body){if(el.id==='ll'){e.preventDefault();return;}el=el.parentElement;}
  });
  var tt=null;
  document.addEventListener('touchstart',function(e){
    if(isInput(e.target))return;
    tt=setTimeout(function(){if(window.getSelection)window.getSelection().removeAllRanges();},300);
  },{passive:true});
  document.addEventListener('touchend',function(){if(tt){clearTimeout(tt);tt=null;}},{passive:true});
  document.addEventListener('touchcancel',function(){if(tt){clearTimeout(tt);tt=null;}},{passive:true});
  document.addEventListener('selectionchange',function(){
    var sel=window.getSelection();
    if(!sel||sel.isCollapsed)return;
    var node=sel.anchorNode;if(!node)return;
    var el=node.nodeType===3?node.parentElement:node;
    if(isInput(el))return;
    if(sel.toString().length>LIM)sel.removeAllRanges();
  });
})();
</script>
