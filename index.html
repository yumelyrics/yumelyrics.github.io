<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YumeSubs — Lirik & Terjemahan Lagu Jepang Indonesia</title>
<link rel="icon" type="image/jpeg" href="anime_icon.png">
<meta name="description" content="YumeSubs adalah website lirik lagu Jepang lengkap dengan romaji dan terjemahan bahasa Indonesia. Temukan arti lagu favoritmu dari artis seperti Back Number, Yorushika, Yoasobi, Ado, Fujii Kaze, Amazarashi, dan banyak lagi. Nyanyi sambil ngerti maknanya, gratis dan lengkap.">
<meta name="keywords" content="YumeSubs, yumelyrics, lirik lagu jepang, terjemahan lagu jepang, romaji indonesia, lirik jepang indonesia, japanese lyrics translation, terjemahan back number, terjemahan yorushika, terjemahan yoasobi, terjemahan ado, terjemahan fujii kaze, terjemahan amazarashi, lagu jepang sedih, lagu anime terjemahan, j-pop terjemahan indonesia, lirik romaji, arti lagu jepang, subtitle lagu jepang, japanese song lyrics bahasa indonesia, lirik lagu jepang dan artinya, lagu jepang populer terjemahan, terjemahan lagu jepang viral, lirik terjemahan jepang indo, belajar jepang dari lagu, yume jimaku">
<meta property="og:title" content="YumeSubs — Lirik & Terjemahan Lagu Jepang">
<meta property="og:description" content="Lirik lagu Jepang, romaji, dan terjemahan Indonesia lengkap. Back Number, Yorushika, Yoasobi, dan lainnya. Nyanyi sambil ngerti maknanya.">
<meta property="og:url" content="https://yumelyrics.github.io/yumesubs.html">
<meta property="og:type" content="website">
<link rel="canonical" href="https://yumelyrics.github.io">
<meta name="google-site-verification" content="kUWbuwBUM0v9gKqMXVG7t9A80DgPCgMYQvOU533ERjE">

<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root{--bg:#07060f;--border:rgba(255,255,255,0.07);--accent:#c9a96e;--accent2:#8b6bb1;--text:#e8e4f0;--muted:#6a6478;--jp:'Shippori Mincho',serif;--en:'DM Sans',sans-serif;--red:#c96e6e}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--en);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:url('https://images.unsplash.com/photo-1528360983277-13d401cdc186?w=1800&q=70') center/cover no-repeat;opacity:.06;z-index:0;pointer-events:none}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 10%,rgba(139,107,177,.18) 0%,transparent 55%),radial-gradient(ellipse at 85% 85%,rgba(201,169,110,.12) 0%,transparent 50%);z-index:0;pointer-events:none}
.wrap{position:relative;z-index:2}
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;height:60px;background:rgba(7,6,15,.8);backdrop-filter:blur(24px);border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:baseline;gap:.6rem;cursor:pointer}
.nljp{font-family:var(--jp);font-size:1.3rem;font-weight:800;color:var(--accent)}
.nlen{font-size:.6rem;color:var(--muted);letter-spacing:.25em;text-transform:uppercase}
.nav-links{display:flex;gap:.25rem;align-items:center}
.nb{background:none;border:none;font-family:var(--en);font-size:.7rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;padding:.45rem .9rem;cursor:pointer;border-radius:2rem;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center}
.nb:hover,.nb.on{color:var(--text);background:rgba(255,255,255,.06)}
.nb.adm{border:1px solid rgba(201,169,110,.3);color:var(--accent)}
.nb.adm:hover{background:rgba(201,169,110,.08)}
.hero{padding:5rem 2.5rem 3rem;max-width:860px}
.eyebrow{font-size:.6rem;color:var(--accent);letter-spacing:.35em;text-transform:uppercase;margin-bottom:1rem}
.hero h1{font-family:var(--jp);font-size:clamp(2.2rem,5.5vw,4rem);font-weight:800;line-height:1.15;color:var(--text);margin-bottom:.9rem}
.hero h1 em{color:var(--accent);font-style:normal}
.hero p{color:var(--muted);font-size:.85rem;font-weight:300;max-width:460px;line-height:1.75}
#catView{padding-bottom:5rem}
.search-wrap{padding:0 2.5rem 1.8rem;max-width:560px}
.search-box{position:relative;display:flex;align-items:center}
.search-icon{position:absolute;left:1rem;color:var(--muted);font-size:.85rem;pointer-events:none}
.search-inp{width:100%;background:rgba(255,255,255,.03);border:1px solid var(--border);color:var(--text);font-family:var(--en);font-size:.82rem;padding:.75rem 1rem .75rem 2.6rem;outline:none;transition:border-color .2s}
.search-inp::placeholder{color:var(--muted)}
.search-inp:focus{border-color:rgba(201,169,110,.4)}
.search-clear{position:absolute;right:.8rem;background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;display:none;padding:0}
.search-clear.vis{display:block}
.sec-hd{display:flex;align-items:center;gap:1rem;margin-bottom:2rem;padding:0 2.5rem}
.sec-lb{font-size:.62rem;color:var(--muted);letter-spacing:.22em;text-transform:uppercase;white-space:nowrap}
.sec-ln{flex:1;height:1px;background:var(--border)}
.song-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:1.5rem;padding:0 2.5rem}
.sc{background:rgba(255,255,255,.025);border:1px solid var(--border);cursor:pointer;transition:transform .25s,border-color .25s,background .25s;overflow:hidden;display:flex;flex-direction:column}
.sc:hover{transform:translateY(-4px);border-color:rgba(201,169,110,.25);background:rgba(255,255,255,.04)}
.sc img{width:100%;aspect-ratio:1;object-fit:cover;display:block;filter:saturate(.7) brightness(.85);transition:filter .3s}
.sc:hover img{filter:saturate(1) brightness(.95)}
.scb{padding:1.1rem;flex:1;display:flex;flex-direction:column}
.scn{font-size:.55rem;color:var(--muted);letter-spacing:.2em;margin-bottom:.5rem}
.scjp{font-family:var(--jp);font-size:1.1rem;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:.15rem}
.scro{font-size:.68rem;color:var(--muted);font-style:italic;font-weight:300;margin-bottom:.2rem}
.scid{font-size:.72rem;color:var(--muted);font-style:italic;font-weight:300;margin-bottom:.8rem}
.scf{display:flex;align-items:center;justify-content:space-between;margin-top:auto}
.scar{font-size:.65rem;color:var(--accent);letter-spacing:.1em;text-transform:uppercase}
.scarr{font-size:.7rem;color:var(--muted);transition:transform .2s,color .2s}
.sc:hover .scarr{transform:translateX(4px);color:var(--accent)}
.no-result{padding:2rem 2.5rem;color:var(--muted);font-size:.8rem;font-style:italic}
.loading-msg{padding:2rem 2.5rem;color:var(--muted);font-size:.8rem;letter-spacing:.05em}
#lyrView{display:none;padding:0 2.5rem 5rem}
#lyrView.on{display:block;animation:fu .35s ease}
@keyframes fu{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.lvback{display:flex;align-items:center;gap:1rem;padding:1.5rem 0 2rem;border-bottom:1px solid var(--border);margin-bottom:2rem}
.gbtn{background:none;border:1px solid var(--border);font-family:var(--en);font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);padding:.45rem 1rem;cursor:pointer;transition:all .2s}
.gbtn:hover{border-color:var(--accent);color:var(--accent)}
.lvt{font-family:var(--jp);font-size:1.25rem;font-weight:600;color:var(--text)}
.lva{font-size:.65rem;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;margin-top:.2rem}
.lvgrid{display:grid;grid-template-columns:260px 1fr;gap:3rem;align-items:start}
.lvcov{width:100%;aspect-ratio:1;object-fit:cover;border:1px solid var(--border);filter:saturate(.75);margin-bottom:1.2rem;display:block}
.lvmeta{font-size:.75rem;color:var(--muted);line-height:1.9}
.lvmeta b{color:var(--text);font-weight:400}
.ytlb{font-size:.6rem;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;margin-bottom:.7rem}
.ytwrap{margin-top:1.2rem}
.ytframe{width:100%;aspect-ratio:16/9;border:1px solid var(--border);background:#000;display:block}
.lctrl{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:2rem}
.tpill{background:none;border:1px solid var(--border);font-family:var(--en);font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:.4rem .85rem;cursor:pointer;border-radius:2rem;transition:all .2s}
.tpill.on{background:var(--accent2);border-color:var(--accent2);color:#fff}
.llines{display:flex;flex-direction:column;gap:2rem;margin-bottom:3rem}
.ljp{font-family:var(--jp);font-size:1.2rem;font-weight:600;color:var(--text);line-height:1.55;margin-bottom:.25rem}
.lro{font-size:.82rem;color:var(--muted);font-style:italic;font-weight:300;line-height:1.6;transition:opacity .25s,max-height .3s;overflow:hidden;max-height:5rem}
.lid{font-size:.88rem;color:var(--accent);font-weight:300;line-height:1.6;transition:opacity .25s,max-height .3s;overflow:hidden;max-height:5rem}
.lro.h,.lid.h{opacity:0;max-height:0}
.lsep{height:1px;background:var(--border);opacity:.4;margin:.5rem 0}
.cmsec{margin-top:2rem;padding-top:2rem;border-top:1px solid var(--border);max-width:600px}
.cmtit{font-size:.62rem;color:var(--muted);letter-spacing:.22em;text-transform:uppercase;margin-bottom:1.5rem}
.cmform{display:flex;flex-direction:column;gap:.6rem;margin-bottom:2rem}
.cmi{background:rgba(255,255,255,.03);border:1px solid var(--border);color:var(--text);font-family:var(--en);font-size:.82rem;padding:.7rem 1rem;outline:none;resize:none;transition:border-color .2s}
.cmi::placeholder{color:var(--muted)}
.cmi:focus{border-color:rgba(201,169,110,.4)}
.cmrow{display:flex;gap:.6rem}
.cmrow .cmi{flex:1}
.sbtn{background:var(--accent2);border:none;font-family:var(--en);font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:#fff;padding:0 1.2rem;cursor:pointer;transition:opacity .2s}
.sbtn:hover{opacity:.8}
.sbtn:disabled{opacity:.4;cursor:not-allowed}
.cmlist{display:flex;flex-direction:column;gap:1rem}
.citem{background:rgba(255,255,255,.02);border:1px solid var(--border);padding:1rem 1.2rem}
.chdr{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:.4rem}
.cname{font-size:.72rem;color:var(--accent);font-weight:500}
.cdate{font-size:.6rem;color:var(--muted)}
.ctxt{font-size:.82rem;color:var(--text);line-height:1.65;font-weight:300}
.nocm{font-size:.78rem;color:var(--muted);font-style:italic}
.toast{position:fixed;bottom:2rem;right:2rem;background:var(--accent);color:#07060f;font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;padding:.7rem 1.4rem;z-index:999;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none}
.toast.on{opacity:1;transform:translateY(0)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
@media(max-width:760px){.lvgrid{grid-template-columns:1fr}}
@media(max-width:600px){nav{padding:0 1.2rem}.hero,.sec-hd,.song-grid,#lyrView{padding-left:1.2rem;padding-right:1.2rem}.search-wrap{padding-left:1.2rem;padding-right:1.2rem}.song-grid{grid-template-columns:1fr 1fr;gap:.8rem}}
</style>
</head>
<body>
<div class="wrap">
<nav>
  <div class="nav-logo" onclick="sv('cat')">
    <div class="nljp">夢字幕</div>
    <div class="nlen">YumeSubs</div>
  </div>
  <div class="nav-links">
    <button class="nb on" id="nb-cat" onclick="sv('cat')">Katalog</button>
    <a class="nb" href="contact.html">Hubungi</a>
    <a class="nb adm" href="admin.html">+ Admin</a>
  </div>
</nav>

<div id="catView">
  <div class="hero">
    <div class="eyebrow">Terjemahan Lagu Jepang</div>
    <h1>Kata-kata yang<br>terasa seperti <em>mimpi</em></h1>
    <p>Lirik Jepang, romaji, dan terjemahan Indonesia. Biar lo nyanyi sambil ngerti maknanya.</p>
  </div>
  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">&#x2315;</span>
      <input class="search-inp" id="searchInp" placeholder="Cari judul, romaji, artis..." oninput="onSearch(this.value)">
      <button class="search-clear" id="searchClear" onclick="clearSearch()">&#x2715;</button>
    </div>
  </div>
  <div class="sec-hd">
    <div class="sec-lb">Katalog Lagu</div>
    <div class="sec-ln"></div>
  </div>
  <div class="song-grid" id="songGrid"><div class="loading-msg">Memuat lagu...</div></div>
  <div class="no-result" id="noResult" style="display:none">Gak ada lagu yang cocok.</div>
</div>

<div id="lyrView">
  <div class="lvback">
    <button class="gbtn" onclick="sv('cat')">← Katalog</button>
    <div>
      <div class="lvt" id="lv-t"></div>
      <div class="lva" id="lv-a"></div>
    </div>
  </div>
  <div class="lvgrid">
    <div>
      <img class="lvcov" id="lv-cov" src="" alt="cover">
      <div class="lvmeta">
        <b id="lv-mt"></b>
        <div id="lv-ma" style="color:var(--accent);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase"></div>
      </div>
      <div class="ytwrap">
        <div class="ytlb">Video</div>
        <iframe class="ytframe" id="ytf" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      </div>
    </div>
    <div>
      <div class="lctrl">
        <button class="tpill on" id="tp-ro" onclick="tl('ro')">Romaji</button>
        <button class="tpill on" id="tp-tr" onclick="tl('tr')">Terjemahan</button>
      </div>
      <div class="llines" id="ll"></div>
      <div class="cmsec">
        <div class="cmtit">Komentar</div>
        <div class="cmform">
          <div class="cmrow">
            <input class="cmi" id="cm-n" placeholder="Nama lo (opsional)">
            <button class="sbtn" id="cm-btn" onclick="postCm()">Kirim</button>
          </div>
          <textarea class="cmi" id="cm-t" rows="3" placeholder="Tulis komentar tentang lagu ini..."></textarea>
        </div>
        <div class="cmlist" id="cmlist"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
</div>

<script type="module">
import { initializeApp }    from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, query, where, orderBy, getDocs }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA3dKYhDxX3DE5CAI_yQbjvUUdsBR0QeS8",
  authDomain: "yumesubs7.firebaseapp.com",
  projectId: "yumesubs7",
  storageBucket: "yumesubs7.firebasestorage.app",
  messagingSenderId: "1076202015626",
  appId: "1:1076202015626:web:ce89fb668eb6b2bd021673"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

let songs = [];
let cur   = null;
let sro   = true, str = true;

// ── Helpers ──
function norm(s){
  return String(s||'').toLowerCase()
    .replace(/[.,\-–—!?'"()[\]{}]/g,' ')
    .replace(/\s+/g,' ').trim();
}
function matches(s, q){
  const nq = norm(q);
  if(!nq) return true;
  const allRo = (s.lyrics||[]).map(l=>l.ro).join(' ');
  const allId = (s.lyrics||[]).map(l=>l.id).join(' ');
  return [s.titleJp,s.titleRo,s.titleId,s.artist,allRo,allId].some(f=>norm(f).includes(nq));
}
function toast(m){
  const t=document.getElementById('toast');
  t.textContent=m; t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),2800);
}

// ── Render catalog ──
function rc(filter=''){
  const q = filter.trim();
  const filtered = q ? songs.filter(s=>matches(s,q)) : songs;
  document.getElementById('songGrid').innerHTML = filtered.map((s,i)=>`
    <div class="sc" data-id="${s.id}" onclick="_os('${s.id}')">
      <img src="${s.img||''}" alt="${s.titleJp}" onerror="this.src='https://placehold.co/400x400/0d0c1a/333?text=%E2%99%AA'">
      <div class="scb">
        <div class="scn">0${i+1}</div>
        <div class="scjp">${s.titleJp}</div>
        ${s.titleRo?`<div class="scro">${s.titleRo}</div>`:''}
        <div class="scid">${s.titleId||''}</div>
        <div class="scf"><div class="scar">${s.artist}</div><div class="scarr">&#x2192;</div></div>
      </div>
    </div>`).join('');
  document.getElementById('noResult').style.display =
    (filtered.length===0 && songs.length>0) ? 'block' : 'none';
}

// ── Search ──
window.onSearch = val => {
  rc(val);
  document.getElementById('searchClear').classList.toggle('vis', val.length>0);
};
window.clearSearch = () => {
  document.getElementById('searchInp').value='';
  document.getElementById('searchClear').classList.remove('vis');
  rc();
};

// ── View switcher ──
window.sv = v => {
  document.getElementById('catView').style.display  = v==='cat'?'block':'none';
  const lv = document.getElementById('lyrView');
  lv.style.display = v==='lyr'?'block':'none';
  lv.classList.toggle('on', v==='lyr');
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  if(v==='cat') document.getElementById('nb-cat').classList.add('on');
  if(v!=='lyr') document.getElementById('ytf').src='';
  window.scrollTo({top:0,behavior:'smooth'});
};

// ── Open song ──
window._os = id => {
  const s = songs.find(x=>x.id===id);
  if(!s) return;
  cur=id; sro=true; str=true;
  document.getElementById('tp-ro').classList.add('on');
  document.getElementById('tp-tr').classList.add('on');
  document.getElementById('lv-t').textContent  = s.titleJp+(s.titleRo?' — '+s.titleRo:'')+(s.titleId?' / '+s.titleId:'');
  document.getElementById('lv-a').textContent  = s.artist;
  document.getElementById('lv-mt').textContent = s.titleJp+(s.titleRo?' ('+s.titleRo+')':'');
  document.getElementById('lv-ma').textContent = s.artist;
  document.getElementById('lv-cov').src = s.img||'https://placehold.co/400x400/0d0c1a/333?text=%E2%99%AA';
  document.getElementById('ytf').src    = 'https://www.youtube.com/embed/'+s.ytId;
  document.getElementById('ll').innerHTML = (s.lyrics||[]).map((l,i)=>`
    <div>
      <div class="ljp">${l.jp}</div>
      <div class="lro">${l.ro}</div>
      <div class="lid">${l.id}</div>
    </div>
    ${i<s.lyrics.length-1?'<div class="lsep"></div>':''}`).join('');
  rcm(id);
  sv('lyr');
};

// ── Toggle romaji/terjemahan ──
window.tl = t => {
  if(t==='ro'){
    sro=!sro;
    document.getElementById('tp-ro').classList.toggle('on',sro);
    document.querySelectorAll('.lro').forEach(e=>e.classList.toggle('h',!sro));
  } else {
    str=!str;
    document.getElementById('tp-tr').classList.toggle('on',str);
    document.querySelectorAll('.lid').forEach(e=>e.classList.toggle('h',!str));
  }
};

// ── Comments ──
async function rcm(songId){
  const el = document.getElementById('cmlist');
  el.innerHTML = '<div class="nocm">Memuat komentar...</div>';
  try {
    const q = query(
      collection(db,'comments'),
      where('songId','==',songId),
      orderBy('ts','desc')
    );
    const snap = await getDocs(q);
    if(snap.empty){
      el.innerHTML = '<div class="nocm">Belum ada komentar. Jadi yang pertama!</div>';
      return;
    }
    el.innerHTML = snap.docs.map(d=>{
      const c = d.data();
      return `<div class="citem">
        <div class="chdr">
          <div class="cname">${c.name}</div>
          <div class="cdate">${c.date}</div>
        </div>
        <div class="ctxt">${c.text}</div>
      </div>`;
    }).join('');
  } catch(e){
    el.innerHTML = '<div class="nocm">Gagal memuat komentar.</div>';
  }
}

window.postCm = async () => {
  const n   = document.getElementById('cm-n').value.trim();
  const t   = document.getElementById('cm-t').value.trim();
  const btn = document.getElementById('cm-btn');
  if(!t || !cur) return;
  btn.disabled = true;
  try {
    await addDoc(collection(db,'comments'), {
      songId : cur,
      name   : n||'Anonim',
      text   : t,
      date   : new Date().toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}),
      ts     : Date.now()
    });
    document.getElementById('cm-t').value = '';
    rcm(cur);
    toast('Komentar terkirim!');
  } catch(e){
    toast('Gagal kirim komentar.');
  }
  btn.disabled = false;
};

// ── Load songs (realtime) ──
onSnapshot(
  query(collection(db,'songs'), orderBy('order','asc')),
  snap => {
    songs = snap.docs.map(d=>({id:d.id, ...d.data()}));
    rc(document.getElementById('searchInp').value||'');
  },
  () => {
    document.getElementById('songGrid').innerHTML =
      '<div class="loading-msg">Gagal memuat data. Coba refresh.</div>';
  }
);

sv('cat');
