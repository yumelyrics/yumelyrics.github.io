
name: Generate Song Pages

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'incremental = baru & diedit saja · full = semua lagu'
        type: choice
        options:
          - incremental
          - full
        default: incremental

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Generate pages
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GENERATE_MODE: ${{ inputs.mode }}
        run: node generate-songs.js

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lagu/ artis/ kata/ sitemap.xml .yume-generate-manifest.json
          git diff --staged --quiet || git commit -m "chore: generate songs (${{ inputs.mode }})"
          git push
